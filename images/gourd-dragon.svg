    <path d="M210 125 Q195 135 185 150 Q178 165 190 175 Q202 185 195 200 Q188 215 175 220" stroke-width="3"/>
    <!-- 龙鳞纹 -->
    <path d="M192 140 Q196 137 200 140 Q196 143 192 140Z" stroke-width="1.5" fill="#5C3010" fill-opacity="0.3"/>
    <path d="M187 152 Q191 149 195 152 Q191 155 187 152Z" stroke-width="1.5" fill="#5C3010" fill-opacity="0.3"/>
    <path d="M188 165 Q192 162 196 165 Q192 168 188 165Z" stroke-width="1.5" fill="#5C3010" fill-opacity="0.3"/>
    <!-- 龙爪 -->
    <path d="M192 155 Q182 148 178 155 Q175 158 178 162 Q180 165 183 162" stroke-width="2"/>
    <path d="M178 155 Q172 150 170 155" stroke-width="1.5"/>
    <path d="M176 157 Q171 155 169 160" stroke-width="1.5"/>
