    <path d="M148 338 Q144 332 148 328" stroke-width="1.5"/>
    <path d="M151 343 Q147 338 150 333" stroke-width="1.5"/>
    <path d="M255 332 Q260 327 256 323" stroke-width="1.5"/>
    <path d="M253 338 Q258 334 254 330" stroke-width="1.5"/>
    <!-- 祥云纹 -->
    <path d="M155 310 Q158 302 164 306 Q167 311 162 317 Q157 319 153 315 Q150 311 155 310" stroke-width="1.5" fill="#6B3A10" fill-opacity="0.1"/>
    <path d="M235 360 Q238 352 244 356 Q247 361 242 367 Q237 369 233 365 Q230 361 235 360" stroke-width="1.5" fill="#6B3A10" fill-opacity="0.1"/>
  </g>
  
  <!-- 腰部装饰带 -->
  <g>
    <path d="M162 265 Q200 258 238 265 Q238 285 200 292 Q162 285 162 265Z" fill="#B8945A" opacity="0.5"/>
    <path d="M167 270 Q200 264 233 270" stroke="#3D1F00" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M165 278 Q200 272 235 278" stroke="#3D1F00" stroke-width="1" fill="none" opacity="0.5"/>
    <!-- 腰带小纹样 -->
    <text x="200" y="282" text-anchor="middle" font-size="8" fill="#3D1F00" opacity="0.7" font-family="serif">龙凤呈祥</text>
  </g>
</svg>