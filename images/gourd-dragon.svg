<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <radialGradient id="gourdGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#F5E6C8;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#D4B896;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6914;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="gourdGrad2" cx="50%" cy="55%" r="50%">
      <stop offset="0%" style="stop-color:#F0DDB8;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#C8A878;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7A5C10;stop-opacity:1" />
    </radialGradient>
    <filter id="burnEffect">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
  
  <!-- 葫芦背景 -->
  <g>
    <!-- 上球 -->
    <ellipse cx="200" cy="165" rx="95" ry="115" fill="url(#gourdGrad)"/>
    <!-- 下球 -->
    <ellipse cx="200" cy="350" rx="130" ry="140" fill="url(#gourdGrad2)"/>
    <!-- 腰部连接 -->
    <rect x="162" y="255" width="76" height="40" fill="#C8A870" rx="10"/>
    <!-- 顶部藤蔓 -->
    <path d="M200 52 Q215 35 225 20 Q230 15 225 12 Q220 10 218 16 Q212 28 205 40" fill="none" stroke="#5A3E10" stroke-width="3" stroke-linecap="round"/>
    <path d="M200 52 Q185 35 175 22 Q170 16 176 13 Q181 11 183 17 Q188 30 196 44" fill="none" stroke="#5A3E10" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 叶子 -->
    <path d="M220 25 Q235 18 240 28 Q235 35 222 30 Z" fill="#6B8C3A" opacity="0.7"/>
    <path d="M180 20 Q165 14 162 24 Q168 30 180 27 Z" fill="#6B8C3A" opacity="0.7"/>
  </g>
  
  <!-- 烙画：龙纹 - 上球 -->
