    <path d="M218 108 Q222 98 226 95 Q228 94 227 98 Q225 103 221 108" stroke-width="2"/>
    <path d="M228 112 Q234 105 238 103 Q240 103 239 107 Q236 111 230 114" stroke-width="2"/>
    <!-- 龙眼 -->
    <circle cx="225" cy="116" r="3" fill="#8B0000" stroke="#3D1F00" stroke-width="1.5"/>
    <!-- 龙须 -->
    <path d="M228 118 Q240 115 248 118 Q255 120 252 125" stroke-width="1.5"/>
    <path d="M228 121 Q237 125 242 130" stroke-width="1.5"/>
