    <path d="M195 375 Q185 400 180 420 Q177 430 184 433 Q190 434 192 424 Q196 408 200 388" stroke-width="2.5"/>
    <path d="M205 375 Q205 400 203 420 Q202 430 208 432 Q214 432 214 422 Q213 406 210 388" stroke-width="2.5"/>
    <path d="M215 372 Q222 396 225 415 Q227 425 221 428 Q215 429 215 419 Q214 403 212 385" stroke-width="2.5"/>
    <path d="M222 368 Q235 390 240 408 Q243 418 237 422 Q231 423 230 413 Q227 397 220 380" stroke-width="2.5"/>
    <!-- 凤尾眼斑 -->
    <ellipse cx="163" cy="420" rx="6" ry="4" stroke-width="1.5" fill="#6B3A10" fill-opacity="0.25"/>
    <ellipse cx="182" cy="428" rx="6" ry="4" stroke-width="1.5" fill="#6B3A10" fill-opacity="0.25"/>
    <ellipse cx="206" cy="430" rx="6" ry="4" stroke-width="1.5" fill="#6B3A10" fill-opacity="0.25"/>
    <ellipse cx="230" cy="424" rx="6" ry="4" stroke-width="1.5" fill="#6B3A10" fill-opacity="0.25"/>
    <!-- 翅膀 -->
    <path d="M175 335 Q155 325 145 335 Q140 342 148 350 Q158 355 172 348" stroke-width="2.5" fill="#6B3A10" fill-opacity="0.15"/>
    <path d="M225 330 Q245 318 258 328 Q262 335 255 343 Q244 348 228 342" stroke-width="2.5" fill="#6B3A10" fill-opacity="0.15"/>
