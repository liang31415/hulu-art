    <path d="M230 130 Q240 125 245 135 Q248 140 243 145 Q237 148 232 143" stroke-width="2" fill="#8B3010" fill-opacity="0.2"/>
    <path d="M240 128 Q247 120 250 128 Q252 132 248 136" stroke-width="1.5"/>
    <!-- 云纹装饰 -->
    <path d="M155 175 Q160 165 170 170 Q175 175 170 182 Q163 185 157 180 Q152 175 155 175" stroke-width="2" fill="#5C3010" fill-opacity="0.15"/>
    <path d="M225 185 Q230 178 238 182 Q242 187 238 193 Q232 196 227 192 Q222 187 225 185" stroke-width="2" fill="#5C3010" fill-opacity="0.15"/>
  </g>
  
  <!-- 烙画：凤凰 - 下球 -->
