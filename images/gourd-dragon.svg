    <ellipse cx="200" cy="340" rx="30" ry="45" stroke-width="2.5" fill="#6B3A10" fill-opacity="0.2" transform="rotate(-15 200 340)"/>
    <!-- 凤头 -->
    <path d="M215 310 Q225 300 230 305 Q232 312 225 315 Q218 316 215 310Z" stroke-width="2" fill="#6B3A10" fill-opacity="0.3"/>
